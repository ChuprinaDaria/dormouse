name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,morph]"
          pip install pymorphy3-dicts-uk

      - name: Lint
        run: ruff check src/

      - name: Test
        env:
          DORMOUSE_OFFLINE: "1"
        run: |
          pytest tests/ \
            --ignore=tests/test_middleware_e2e.py \
            --ignore=tests/test_unsqueeze.py \
            --ignore=tests/test_import.py \
            --ignore=tests/test_mapper.py \
            -k "not cloud and not version" -q
